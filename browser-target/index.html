<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>edgejs in browser</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; padding: 0;
        background: #0c0c0e; color: #e7e7ea;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; line-height: 1.5;
      }
      header {
        padding: 12px 16px;
        background: #16161a;
        border-bottom: 1px solid #2a2a30;
        display: flex; align-items: center; gap: 12px;
      }
      header h1 { font-size: 13px; margin: 0; font-weight: 600; }
      header .meta { color: #888; font-size: 11px; }
      #log {
        padding: 8px 16px;
        white-space: pre;
        overflow-x: auto;
      }
      .lvl-info { color: #a5d8ff; }
      .lvl-call { color: #888; }
      .lvl-out  { color: #c0eb75; }
      .lvl-err  { color: #ff6b6b; }
      .lvl-warn { color: #ffd166; }
    </style>
  </head>
  <body>
    <header>
      <h1>edgejs · browser target</h1>
      <span class="meta" id="status">starting…</span>
      <span class="meta" id="filter-hint" style="margin-left:auto;font-size:11px;">
        filter: <input id="filter" type="text" placeholder="symbol or arg substring" style="background:#1c1c20;color:#eee;border:1px solid #2a2a30;padding:2px 6px;font-family:inherit;font-size:11px;width:240px;" />
      </span>
    </header>
    <pre id="log"></pre>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
