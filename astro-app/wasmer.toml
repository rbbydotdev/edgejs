[package]
name = "christoph/edgejs-quickjs-astro"
version = "0.0.1"
description = "Astro SSR sample for EdgeJS QuickJS"
entrypoint = "astro-app"

[fs]
"/app" = "."
"/usr/local/ssl" = "../ssl-certs"

[[module]]
name = "edgejs"
source = "../build-quickjs-wasix/edgejs.wasm"

[[command]]
name = "astro-app"
module = "edgejs"
runner = "https://webc.org/runner/wasi"

[command.annotations.wasi]
main-args = ["/app/dist/server/entry.cjs"]
