name: quickjs-wasix

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quickjs-wasix-linux:
    name: quickjs-wasix-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install wasixcc
        uses: wasix-org/wasixcc@v0.4.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sysroot-tag: v2026-02-16.1
          version: v0.4.2

      - name: Build edge (QuickJS WASIX)
        shell: bash
        run: |
          set -euo pipefail
          make build-quickjs-wasix

      - name: Install Wasmer CLI
        uses: wasmerio/setup-wasmer@v3

      - name: Smoke test QuickJS WASIX manifest
        shell: bash
        run: |
          set -euo pipefail
          WASMER_MANIFEST="$(pwd)/quickjs-wasm/wasmer.toml"
          test -f "${WASMER_MANIFEST}"
          wasmer run "${WASMER_MANIFEST}" -- --version
          wasmer run "${WASMER_MANIFEST}" -- -e "console.log('hello from quickjs')"

      - name: Smoke test WASIX safe mode via Wasmer CLI
        shell: bash
        run: |
          set -euo pipefail
          make test-wasix-safe-mode WASMER_BIN=wasmer WASIX_PACKAGE_DIR="$(pwd)/quickjs-wasm"
